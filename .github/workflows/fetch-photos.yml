name: Fetch Place Photos

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City: yerevan / bangkok / samui / phangan / hoian / bali / danang / singapore'
        required: false
        default: 'yerevan'
      batch_size:
        description: 'Max places per run (9999 = all)'
        required: false
        default: '9999'
      max_photos:
        description: 'Max photos per place (5-10)'
        required: false
        default: '10'
      skip_ids:
        description: 'Comma-separated place IDs to skip'
        required: false
        default: ''

jobs:
  fetch-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch photos and commit via GitHub API
        env:
          SERPER_KEY: ${{ secrets.SERPER_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/fetch_photos.py \
            --city "${{ inputs.city }}" \
            --max_photos "${{ inputs.max_photos }}" \
            --batch "${{ inputs.batch_size }}" \
            --skip "${{ inputs.skip_ids }}"

      - name: Upload photos.json as backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photos-json
          path: src/photos.json
          retention-days: 90
