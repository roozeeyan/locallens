name: Fetch Place Photos

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City to process: yerevan / bangkok / samui / phangan / hoian / bali / danang / singapore (leave empty for all)'
        required: false
        default: 'yerevan'
      batch_size:
        description: 'Max places per run (default 9999 = all in city)'
        required: false
        default: '9999'
      max_photos:
        description: 'Photos per place: 4 = 1 query/place (saves credits); 6 = 2 queries for cafes/bars'
        required: false
        default: '4'
      skip_ids:
        description: 'Comma-separated IDs to skip'
        required: false
        default: ''

jobs:
  fetch-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch photos via Serper
        env:
          SERPER_KEY: ${{ secrets.SERPER_KEY }}
        run: |
          python scripts/fetch_photos.py \
            --city "${{ inputs.city }}" \
            --max_photos "${{ inputs.max_photos }}" \
            --batch "${{ inputs.batch_size }}" \
            --skip "${{ inputs.skip_ids }}"

      - name: Print stats
        if: always()
        run: |
          python -c "
          import json
          with open('src/photos.json') as f:
              d = json.load(f)
          filled = sum(1 for v in d.values() if v)
          print(f'Places with photos: {filled}/{len(d)}')
          "

      - name: Upload photos.json as artifact (safety backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photos-json
          path: src/photos.json
          retention-days: 90

      - name: Commit and push
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git rebase origin/main
          git add src/photos.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          FILLED=$(python -c "import json; d=json.load(open('src/photos.json')); print(sum(1 for v in d.values() if v))")
          git commit -m "Add place photos via Serper API ($FILLED places)"
          git push origin HEAD
