<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#F0EDE8" />
    <title>LocalLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F0EDE8; }
    </style>
  </head>
  <body>
    <script>
(function(){
  var p = localStorage.getItem('ll_access');
  if(p !== '919526'){
    var input = prompt('Введи код доступа:');
    if(input !== '919526'){
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666">Доступ закрыт</div>';
      throw new Error('Access denied');
    }
    localStorage.setItem('ll_access', input);
  }
})();
</script>

    <noscript>Включи JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
